<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="#0A0F1E"/>
  <!-- Left person (head) -->
  <circle cx="12" cy="9" r="3.5" fill="#E8A838"/>
  <!-- Right person (head) -->
  <circle cx="28" cy="9" r="3.5" fill="#E8A838"/>
  <!-- V shape: two people converging (accountability) -->
  <path d="M12 13.5 L20 30 L28 13.5" stroke="#E8A838" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Small dot at convergence point (the shared goal) -->
  <circle cx="20" cy="30" r="2" fill="#3ECFAA"/>
</svg>
